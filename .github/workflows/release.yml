name: Build and Release (Windows EXE)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows executable with PyInstaller
        run: |
          pyinstaller src/app/main.py --name tool-001 --onefile --paths src

      - name: Generate build metadata
        shell: bash
        run: |
          cd dist
          sha256sum tool-001.exe > tool-001.exe.sha256

      - name: Upload workflow artifact (EXE)
        uses: actions/upload-artifact@v4
        with:
          name: tool-001-windows-build
          path: |
            dist/tool-001.exe
            dist/tool-001.exe.sha256

      - name: Publish release asset (EXE)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/tool-001.exe
            dist/tool-001.exe.sha256
