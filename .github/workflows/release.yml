name: Build and Release

on:
  push:
    tags:
      - "v*"
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            name: linux
            asset_ext: tar.gz
          - os: windows-latest
            name: windows
            asset_ext: zip
          - os: macos-latest
            name: macos
            asset_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller src/app/main.py \
            --name tool-001-${{ matrix.platform.name }} \
            --onefile \
            --windowed

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf tool-001-${{ matrix.platform.name }}.${{ matrix.platform.asset_ext }} tool-001-${{ matrix.platform.name }}

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/tool-001-${{ matrix.platform.name }}.exe -DestinationPath dist/tool-001-${{ matrix.platform.name }}.${{ matrix.platform.asset_ext }}

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tool-001-${{ matrix.platform.name }}.${{ matrix.platform.asset_ext }}
